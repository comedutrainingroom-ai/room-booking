# =============================================================
#  Nginx Reverse Proxy — Room Booking System
#  Entry point (:80) → routes to client & server containers
# =============================================================

upstream api_server {
    server server:5000;
}

upstream client_app {
    server client:80;
}

server {
    listen 80;
    server_name _;

    # Max upload size (สำหรับรูปภาพห้อง)
    client_max_body_size 10m;

    # ── API requests → Express server ──
    location /api/ {
        proxy_pass          http://api_server;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Uploaded files → Express static ──
    location /uploads/ {
        proxy_pass          http://api_server;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;

        # Cache uploaded images
        proxy_cache_valid   200 1d;
        expires             1d;
        add_header          Cache-Control "public";
    }

    # ── Socket.io → WebSocket upgrade ──
    location /socket.io/ {
        proxy_pass          http://api_server;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;

        # WebSocket timeouts
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ── Everything else → React SPA ──
    location / {
        proxy_pass          http://client_app;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }
}
