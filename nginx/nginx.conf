# =============================================================
#  Nginx Reverse Proxy - Room Booking System
#  Entry point (:80) -> routes to client and server containers
# =============================================================

# Per-IP rate limits to reduce abuse before requests hit Express.
limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=15r/s;
limit_req_zone $binary_remote_addr zone=auth_per_ip:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

upstream api_server {
    server server:5000;
}

upstream client_app {
    server client:80;
}

server {
    listen 80;
    server_name _;
    server_tokens off;
    limit_req_status 429;

    # Upload guardrails
    client_max_body_size 50m;
    client_body_timeout 15s;
    client_header_timeout 15s;
    keepalive_timeout 30s;
    send_timeout 30s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Tighter auth rate limit for login-related routes.
    location /api/auth/ {
        limit_req           zone=auth_per_ip burst=10 nodelay;
        limit_conn          conn_per_ip 10;
        proxy_pass          http://api_server;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # General API traffic
    location /api/ {
        limit_req           zone=api_per_ip burst=30 nodelay;
        limit_conn          conn_per_ip 30;
        proxy_pass          http://api_server;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Uploaded files
    location /uploads/ {
        limit_conn          conn_per_ip 20;
        proxy_pass          http://api_server;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;

        proxy_cache_valid   200 1d;
        expires             1d;
        add_header          Cache-Control "public";
    }

    # Socket.io / WebSocket
    location /socket.io/ {
        limit_conn          conn_per_ip 10;
        proxy_pass          http://api_server;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # Everything else -> React SPA
    location / {
        proxy_pass          http://client_app;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }
}
